<!-- script url: https://script.google.com/macros/s/AKfycbwuSOYBbgk8_Uetg2So-YAR535RCzoUSxoYQihjrUEh7DWEbMU1H9ojwTY71GMYigvg/exec-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EES Summer Adventures</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // ⚠️ CONFIGURATION - UPDATE THIS URL ⚠️
    // ==========================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuSOYBbgk8_Uetg2So-YAR535RCzoUSxoYQihjrUEh7DWEbMU1H9ojwTY71GMYigvg/exec'; 

    const INITIAL_PHOTOS = [];
    const HASHTAGS = ['#EESSummer', '#DuckAdventures', '#RubberDuck', '#EESFamily', '#SummerReading'];
    const EMOJIS = ['🦆', '😎', '🌞', '❤️', '😂', '🕶️', '🧢', '⭐'];

    // --- SVG ICONS ---
    const IconCamera = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
    const IconImage = ({ size = 24 }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width={size} height={size}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
    const IconPlus = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="12" x2="12" y1="8" y2="16"/><line x1="8" x2="16" y1="12" y2="12"/></svg>;
    const IconX = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="24" height="24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const IconChevronUp = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="20" height="20"><polyline points="18 15 12 9 6 15"/></svg>;
    const IconSmile = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>;
    const IconTrash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="20" height="20"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    const IconCheck = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="12" height="12"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;


    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [view, setView] = useState('feed');
      const [photos, setPhotos] = useState(INITIAL_PHOTOS);
      const [toastMessage, setToastMessage] = useState('');
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        if (sessionStorage.getItem('ees_auth') === 'true') {
          setIsAuthenticated(true);
        }
      }, []);

      useEffect(() => {
        if (view === 'feed' && isAuthenticated && SCRIPT_URL.startsWith('http')) {
          fetchLivePhotos();
        } else if (!SCRIPT_URL.startsWith('http')) {
           setIsLoading(false); // Demo mode
        }
      }, [view, isAuthenticated]);

      const fetchLivePhotos = async () => {
        // Check session storage first for instant loading
        const cachedPhotos = sessionStorage.getItem('ees_photos_cache');
        if (cachedPhotos) {
            setPhotos(JSON.parse(cachedPhotos));
            setIsLoading(false); 
        } else {
            setIsLoading(true);
        }

        try {
          const response = await fetch(SCRIPT_URL + "?action=getPhotos");
          const data = await response.json();
          if (data.photos) {
            setPhotos(data.photos);
            // Save to cache for next time
            sessionStorage.setItem('ees_photos_cache', JSON.stringify(data.photos));
          }
        } catch (error) {
          console.error("Failed to load photos", error);
        } finally {
          setIsLoading(false);
        }
      };

      const handleLogin = (password) => {
        if (password === 'summer24') {
          sessionStorage.setItem('ees_auth', 'true');
          setIsAuthenticated(true);
        } else {
          alert('Incorrect password. Try "summer24"');
        }
      };

      const handleAddPhoto = async (newPhoto) => {
        setView('feed');
        setToastMessage('Uploading your photo to the vault...');

        if (!SCRIPT_URL.startsWith('http')) {
          setPhotos(prev => [{ ...newPhoto, id: Date.now().toString(), timestamp: new Date().toISOString(), approved: true }, ...prev]);
          setToastMessage('Demo mode: Photo submitted!');
          setTimeout(() => setToastMessage(''), 4000);
          return;
        }

        try {
          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
              action: 'upload',
              imageBase64: newPhoto.imageUrl,
              caption: newPhoto.caption,
              hashtag: newPhoto.hashtag
            })
          });
          
          const result = await response.json();
          if (result.success) {
             setToastMessage('Success! Photo sent to moderation team.');
             // Clear cache so it fetches fresh data next time
             sessionStorage.removeItem('ees_photos_cache'); 
          } else {
             setToastMessage('Oops! There was an error uploading.');
          }
        } catch (error) {
           console.error(error);
           setToastMessage('Upload failed. Check your internet connection.');
        }

        setTimeout(() => setToastMessage(''), 5000);
      };

      if (!isAuthenticated) return <LoginScreen onLogin={handleLogin} />;

      return (
        <div className="min-h-screen text-gray-900 font-sans pb-8">
          {toastMessage && (
            <div className="fixed top-16 left-1/2 transform -translate-x-1/2 z-50 bg-gray-800 text-white px-5 py-3 rounded-full shadow-xl text-sm w-max max-w-[90%] text-center">
              {toastMessage}
            </div>
          )}

          <header className="fixed top-0 left-0 right-0 h-14 bg-white border-b border-gray-200 z-40 flex items-center justify-between px-4 max-w-lg mx-auto w-full shadow-sm">
            <h1 className="text-xl font-bold text-green-800 tracking-tight">EES SummerGram</h1>
            {view === 'feed' ? (
              <button onClick={() => setView('upload')} className="flex items-center gap-1 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 px-3 py-1.5 rounded-full font-semibold text-sm transition-colors">
                <IconPlus /> <span>Add Photo</span>
              </button>
            ) : (
              <button onClick={() => setView('feed')} className="p-2 text-gray-500 hover:bg-gray-100 rounded-full">
                <IconX />
              </button>
            )}
          </header>

          <main className="pt-14 max-w-lg mx-auto bg-white min-h-screen shadow-sm border-x border-gray-100">
            {view === 'feed' ? <Feed photos={photos} isLoading={isLoading} /> : <UploadScreen onCancel={() => setView('feed')} onSubmit={handleAddPhoto} />}
          </main>
        </div>
      );
    }

    // ==========================================
    // COMPONENTS
    // ==========================================
    function LoginScreen({ onLogin }) {
      const [password, setPassword] = useState('');
      return (
        <div className="min-h-screen bg-blue-50 flex flex-col items-center justify-center p-6">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
            <div className="text-6xl mb-4">🦆</div>
            <h1 className="text-2xl font-bold text-blue-600 mb-2">EES Summer</h1>
            <p className="text-gray-500 mb-6 text-sm">Enter the school password to view and share your summer adventures!</p>
            <form onSubmit={(e) => { e.preventDefault(); onLogin(password); }} className="space-y-4">
              <input type="password" placeholder="Password (summer24)" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"/>
              <button type="submit" className="w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-3 rounded-xl transition-colors">Enter Feed</button>
            </form>
          </div>
        </div>
      );
    }

    function FeedSkeleton() {
      return (
        <div className="animate-pulse flex flex-col w-full">
          {[1, 2].map((i) => (
            <div key={i} className="border-b border-gray-100 pb-4 mb-4">
              <div className="px-4 py-3 flex items-center gap-2">
                <div className="w-8 h-8 bg-gray-200 rounded-full"></div>
                <div className="flex flex-col gap-2">
                  <div className="h-3 bg-gray-200 rounded w-24"></div>
                  <div className="h-2 bg-gray-100 rounded w-16"></div>
                </div>
              </div>
              <div className="bg-gray-200 w-full aspect-square"></div>
              <div className="px-4 pt-3 flex flex-col gap-2">
                <div className="h-3 bg-gray-200 rounded w-3/4"></div>
                <div className="h-3 bg-gray-100 rounded w-1/2"></div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function Feed({ photos, isLoading }) {
      // Manage how many photos to show at once
      const [visibleCount, setVisibleCount] = useState(5);

      const getDriveImageUrl = (url) => {
        if (!url) return '';
        if (url.includes('drive.google.com/uc')) {
          try {
            const id = new URLSearchParams(url.split('?')[1]).get('id');
            // Changed sz=w1000 to sz=w600 for massively faster loading
            if (id) return `https://drive.google.com/thumbnail?id=${id}&sz=w600`;
          } catch (e) { return url; }
        }
        return url;
      };

      if (isLoading && photos.length === 0) {
         return <FeedSkeleton />;
      }
      
      if (photos.length === 0) {
        return (
          <div className="flex flex-col items-center justify-center h-64 text-gray-500">
            <IconCamera className="w-12 h-12 mb-4 opacity-50 block mx-auto" />
            <p>No photos yet. Be the first!</p>
          </div>
        );
      }

      // Only slice the photos we want to show
      const visiblePhotos = photos.slice(0, visibleCount);

      return (
        <div className="flex flex-col">
          {visiblePhotos.map((photo) => (
            <article key={photo.id} className="border-b border-gray-100 pb-4 mb-4 fade-in">
              <div className="px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-lg">🦆</div>
                  <div>
                    <span className="font-semibold text-sm">EES Family</span>
                    <span className="text-xs text-gray-400 block">{new Date(photo.timestamp).toLocaleDateString([], { month: 'short', day: 'numeric' })}</span>
                  </div>
                </div>
              </div>
              <div className="bg-gray-100 w-full aspect-square overflow-hidden flex items-center justify-center">
                <img src={getDriveImageUrl(photo.imageUrl)} alt={photo.caption} className="w-full h-full object-cover transition-opacity duration-500" loading="lazy" />
              </div>
              <div className="px-4 pt-3">
                <span className="text-blue-600 font-medium text-sm mr-2">{photo.hashtag}</span>
                <span className="text-sm text-gray-800">{photo.caption}</span>
              </div>
            </article>
          ))}
          
          <div className="py-8 flex flex-col items-center justify-center text-center px-4">
            {photos.length > visibleCount ? (
               <button 
                 onClick={() => setVisibleCount(prev => prev + 5)} 
                 className="bg-gray-900 text-white font-semibold py-3 px-8 rounded-full hover:bg-gray-800 transition-colors shadow-md"
               >
                 Load More Photos
               </button>
            ) : (
               <>
                 <div className="w-16 h-1 bg-gray-200 rounded-full mb-6"></div>
                 <p className="text-gray-500 mb-4 font-medium">You've reached the end!</p>
                 <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="flex items-center gap-2 text-blue-600 font-semibold hover:text-blue-800 transition-colors bg-blue-50 px-6 py-3 rounded-full">
                   <IconChevronUp /> Return to top
                 </button>
               </>
            )}
          </div>
        </div>
      );
    }

    function UploadScreen({ onCancel, onSubmit }) {
      const [imageUrl, setImageUrl] = useState(null);
      const [caption, setCaption] = useState('');
      const [selectedHashtag, setSelectedHashtag] = useState(HASHTAGS[0]);
      const [emojis, setEmojis] = useState([]); 
      const [activeEmojiId, setActiveEmojiId] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      
      const [imgAspect, setImgAspect] = useState(1);
      const [pan, setPan] = useState(50);
      const [isFit, setIsFit] = useState(false);

      const containerRef = useRef(null);
      const imageRef = useRef(null);
      const fileInputRef = useRef(null);
      const [draggingId, setDraggingId] = useState(null);

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) setImageUrl(URL.createObjectURL(file));
      };

      useEffect(() => {
        const handlePointerMove = (e) => {
          if (!draggingId || !containerRef.current) return;
          if (e.cancelable) e.preventDefault();
          const container = containerRef.current.getBoundingClientRect();
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          let newX = Math.max(0, Math.min(100, ((clientX - container.left) / container.width) * 100));
          let newY = Math.max(0, Math.min(100, ((clientY - container.top) / container.height) * 100));
          setEmojis(prev => prev.map(em => em.id === draggingId ? { ...em, x: newX, y: newY } : em));
        };
        const handlePointerUp = () => setDraggingId(null);
        if (draggingId) {
          window.addEventListener('mousemove', handlePointerMove);
          window.addEventListener('mouseup', handlePointerUp);
          window.addEventListener('touchmove', handlePointerMove, { passive: false });
          window.addEventListener('touchend', handlePointerUp);
        }
        return () => {
          window.removeEventListener('mousemove', handlePointerMove);
          window.removeEventListener('mouseup', handlePointerUp);
          window.removeEventListener('touchmove', handlePointerMove);
          window.removeEventListener('touchend', handlePointerUp);
        };
      }, [draggingId]);

      const handleFinalSubmit = async () => {
        if (!imageUrl) return;
        setIsProcessing(true);
        try {
          let finalImageUrl = imageUrl;
          if (imageRef.current) {
            const canvas = document.createElement('canvas');
            canvas.width = 1000;
            canvas.height = 1000;
            const ctx = canvas.getContext('2d');
            const img = imageRef.current;
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 1000, 1000);

            if (isFit) {
                let drawW = 1000;
                let drawH = 1000;
                if (imgAspect > 1) { 
                    drawH = 1000 / imgAspect;
                } else { 
                    drawW = 1000 * imgAspect;
                }
                const drawX = (1000 - drawW) / 2;
                const drawY = (1000 - drawH) / 2;
                ctx.drawImage(img, drawX, drawY, drawW, drawH);
            } else {
                let sSize = Math.min(img.naturalWidth, img.naturalHeight);
                let sx = 0;
                let sy = 0;
                if (imgAspect > 1) { 
                    sx = (img.naturalWidth - sSize) * (pan / 100);
                } else { 
                    sy = (img.naturalHeight - sSize) * (pan / 100);
                }
                ctx.drawImage(img, sx, sy, sSize, sSize, 0, 0, 1000, 1000);
            }

            if (emojis.length > 0) {
                const containerW = containerRef.current?.offsetWidth || 1000;
                const scaleFactor = 1000 / containerW;
                emojis.forEach(e => {
                  ctx.font = `${e.size * scaleFactor}px Arial`;
                  ctx.textAlign = 'center';
                  ctx.textBaseline = 'middle';
                  ctx.fillText(e.char, (e.x / 100) * 1000, (e.y / 100) * 1000);
                });
            }
            finalImageUrl = canvas.toDataURL('image/jpeg', 0.8);
          }
          onSubmit({ imageUrl: finalImageUrl, caption, hashtag: selectedHashtag });
        } catch (error) {
          alert("Processing failed. Try again.");
          setIsProcessing(false);
        }
      };

      if (!imageUrl) {
        return (
          <div className="flex flex-col items-center justify-center h-[70vh] px-6 text-center">
            <div className="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center text-blue-500 mb-6"><IconImage size="40" /></div>
            <h2 className="text-xl font-bold mb-2">Share a Summer Adventure</h2>
            <p className="text-gray-500 mb-8 text-sm">Upload a photo of your branded duck out in the wild!</p>
            <input type="file" accept="image/*" ref={fileInputRef} onChange={handleFileChange} className="hidden" />
            <button onClick={() => fileInputRef.current?.click()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg active:scale-95 transition-transform">Select Photo</button>
          </div>
        );
      }

      const activeEmoji = emojis.find(e => e.id === activeEmojiId);

      return (
        <div className="flex flex-col pb-24">
          <div className="bg-black w-full aspect-square relative overflow-hidden" ref={containerRef} onClick={(e) => { if (e.target === imageRef.current) setActiveEmojiId(null); }}>
            <img 
              ref={imageRef} 
              src={imageUrl} 
              alt="Preview" 
              onLoad={(e) => setImgAspect(e.target.naturalWidth / e.target.naturalHeight)}
              className="w-full h-full block pointer-events-none" 
              style={{
                objectFit: isFit ? 'contain' : 'cover',
                objectPosition: (!isFit && imgAspect !== 1) ? (imgAspect > 1 ? `${pan}% 50%` : `50% ${pan}%`) : 'center'
              }}
            />
            {emojis.map((em) => (
              <div key={em.id} onPointerDown={(e) => { e.stopPropagation(); setActiveEmojiId(em.id); setDraggingId(em.id); }}
                className={`absolute cursor-move select-none touch-none ${activeEmojiId === em.id ? 'ring-2 ring-yellow-400 ring-offset-2 ring-offset-black rounded-sm' : ''}`}
                style={{ left: `${em.x}%`, top: `${em.y}%`, transform: 'translate(-50%, -50%)', fontSize: `${em.size}px`, lineHeight: 1, zIndex: activeEmojiId === em.id ? 20 : 10 }}>
                {em.char}
              </div>
            ))}
          </div>

          <div className="bg-white border-b border-gray-200 p-3 space-y-3">
            <div className="flex items-center justify-between">
              <span className="text-sm font-semibold text-gray-700 flex items-center gap-1"><IconImage size="16"/> Framing</span>
              <button onClick={() => setIsFit(!isFit)} className="text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-full transition-colors">
                {isFit ? "Crop to Square" : "Shrink to Fit"}
              </button>
            </div>
            {!isFit && imgAspect !== 1 && (
               <div className="flex items-center gap-3 bg-gray-50 p-2 rounded-lg">
                 <span className="text-xs text-gray-500 font-bold uppercase w-12 text-center">{imgAspect > 1 ? 'Pan ↔' : 'Pan ↕'}</span>
                 <input type="range" min="0" max="100" value={pan} onChange={(e) => setPan(parseInt(e.target.value))} className="flex-1 accent-gray-700" />
               </div>
            )}
          </div>

          <div className="bg-white p-3 border-b flex gap-2 overflow-x-auto whitespace-nowrap hide-scrollbar items-center">
            <span className="text-xs text-gray-500 font-medium px-2 flex items-center gap-1"><IconSmile /> Stickers:</span>
            {EMOJIS.map(emoji => (
               <button key={emoji} onClick={() => { const id = Date.now().toString(); setEmojis([...emojis, {id, char: emoji, x: 50, y: 50, size: 60}]); setActiveEmojiId(id); }} className="w-10 h-10 flex-shrink-0 bg-gray-100 rounded-full flex items-center justify-center text-xl hover:bg-gray-200 transition-colors">{emoji}</button>
            ))}
          </div>

          {activeEmojiId && activeEmoji && (
            <div className="bg-gray-800 text-white p-4 flex items-center justify-between gap-4">
              <div className="flex-1 flex items-center gap-3">
                <span className="text-xs text-gray-400 uppercase tracking-wider font-semibold">Size</span>
                <input type="range" min="20" max="150" value={activeEmoji.size} onChange={(e) => setEmojis(prev => prev.map(em => em.id === activeEmojiId ? { ...em, size: parseInt(e.target.value) } : em))} className="flex-1 accent-yellow-400" />
              </div>
              <button onClick={() => { setEmojis(prev => prev.filter(em => em.id !== activeEmojiId)); setActiveEmojiId(null); }} className="p-2 bg-red-500/20 text-red-400 rounded-full hover:bg-red-500/30 transition-colors"><IconTrash /></button>
            </div>
          )}

          <div className="p-4 space-y-5">
            <div>
              <label className="block text-sm font-semibold text-gray-700 mb-2">Caption</label>
              <textarea value={caption} onChange={(e) => setCaption(e.target.value)} placeholder="Write a caption..." className="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none h-24" />
            </div>
            <div>
              <label className="block text-sm font-semibold text-gray-700 mb-2">Select a Hashtag</label>
              <div className="flex flex-wrap gap-2">
                {HASHTAGS.map(tag => (
                  <button key={tag} onClick={() => setSelectedHashtag(tag)} className={`px-4 py-2 rounded-full text-sm font-medium transition-colors border ${selectedHashtag === tag ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}>{tag}</button>
                ))}
              </div>
            </div>
            <div className="pt-4 flex gap-3">
              <button onClick={() => { if (window.confirm("Discard this photo?")) { setImageUrl(null); setEmojis([]); setIsFit(false); setPan(50); } }} className="flex-1 py-3 px-4 rounded-xl font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200">Discard</button>
              <button onClick={handleFinalSubmit} disabled={isProcessing} className="flex-1 py-3 px-4 rounded-xl font-bold text-yellow-900 bg-yellow-400 hover:bg-yellow-500 disabled:opacity-50 flex justify-center items-center">{isProcessing ? 'Processing...' : 'Share to Feed'}</button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
